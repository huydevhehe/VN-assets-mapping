<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN Assets Mapping - Bản Pro 8 Cụm</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #2980b9;
            --bg-sidebar: rgba(255, 255, 255, 0.98);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; background: #fdfdfd; }
        
        #map { width: 100%; height: 100vh; z-index: 10; background: #fff; }

        .sidebar {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 320px;
            max-height: 92vh;
            background: var(--bg-sidebar);
            border-radius: 12px;
            z-index: 9999;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow-y: auto;
            border: 1px solid #ddd;
        }

        .sidebar h2 { margin: 0 0 12px 0; color: #333; font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--primary-color); padding-bottom: 8px;}
        
        .cluster-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 12px 0;
        }

        .cluster-header { display: flex; align-items: center; justify-content: space-between; font-weight: bold; color: #2c3e50; font-size: 0.95rem; margin-bottom: 6px; }
        
        .sub-toggles {
            display: flex;
            gap: 15px;
            margin-left: 5px;
            padding-top: 5px;
        }

        .sub-toggles label {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #555;
        }

        .sub-toggles input { margin-right: 5px; }

        .status { font-size: 0.7rem; font-style: italic; color: #999; margin-top: 4px; display: block; }
        .loading { color: #e67e22; font-weight: bold; }
        .loaded { color: #27ae60; }

        /* Custom Popup */
        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; }
        .data-table td { padding: 3px 5px; border: 1px solid #eee; }
        .label { font-weight: bold; background: #fafafa; color: #666; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>💎 QUẢN LÝ DỮ LIỆU</h2>
    <div id="controls">
        <!-- Cụm template cho 8 vùng -->
        <script>
            const clusters = [
                { id: 1, name: "Cụm 1: Đông Bắc & Tây Bắc", provinces: "Hà Giang, Cao Bằng, Lào Cai, Bắc Kạn, Lạng Sơn, Tuyên Quang, Yên Bái, Thái Nguyên, Phú Thọ." },
                { id: 2, name: "Cụm 2: Đồng bằng Sông Hồng", provinces: "Vĩnh Phúc, Bắc Giang, Bắc Ninh, Quảng Ninh, Hải Dương, Hải Phòng, Hưng Yên, Thái Bình, Hà Nam, Nam Định, Ninh Bình." },
                { id: 3, name: "Cụm 3: Bắc Trung Bộ", provinces: "Thanh Hóa, Nghệ An, Hà Tĩnh, Quảng Bình, Quảng Trị." },
                { id: 4, name: "Cụm 4: Duyên hải Nam Trung Bộ", provinces: "Thừa Thiên Huế, Đà Nẵng, Quảng Nam, Quảng Ngãi, Bình Định, Phú Yên." },
                { id: 5, name: "Cụm 5: Tây Nguyên", provinces: "Kon Tum, Gia Lai, Đắk Lắk, Đắk Nông, Lâm Đồng." },
                { id: 6, name: "Cụm 6: Đông Nam Bộ", provinces: "Khánh Hòa, Ninh Thuận, Bình Thuận, Bình Phước, Tây Ninh, Bình Dương, Đồng Nai, Bà Rịa - Vũng Tàu, TP.HCM." },
                { id: 7, name: "Cụm 7: Tây Nam Bộ (Nhóm 1)", provinces: "Long An, Tiền Giang, Bến Tre, Trà Vinh, Vĩnh Long, Đồng Tháp, An Giang." },
                { id: 8, name: "Cụm 8: Tây Nam Bộ (Nhóm 2)", provinces: "Cần Thơ, Hậu Giang, Sóc Trăng, Bạc Liêu, Cà Mau, Kiên Giang." }
            ];

            const controlsDiv = document.getElementById('controls');
            clusters.forEach(c => {
                controlsDiv.innerHTML += `
                    <div class="cluster-item">
                        <div class="cluster-header">
                            <span>${c.name}</span>
                        </div>
                        <div class="provinces-list">${c.provinces}</div>
                        <div class="sub-toggles">
                            <label><input type="checkbox" id="line-${c.id}" onchange="toggleLayer(${c.id}, 'line')"> Sông</label>
                            <label><input type="checkbox" id="poly-${c.id}" onchange="toggleLayer(${c.id}, 'poly')"> Vùng</label>
                        </div>
                        <span id="status-${c.id}" class="status">Sẵn sàng</span>
                    </div>
                `;
            });
        </script>
    </div>
    <div style="margin-top: 15px; font-size: 0.75rem; color: #888; border-top: 1px solid #eee; padding-top: 10px;">
        * Sông (Line): Chi tiết mương máng.<br>
        * Vùng (Polygon): Sông lớn, hồ chứa.
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Khởi tạo Map với nền cực sạch
    const map = L.map('map', {
        preferCanvas: true
    }).setView([16.0, 106.0], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 2. Load viền Việt Nam để "định hình" vùng chỉ có ở VN
    fetch('ranh_gioi_tinh.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: {
                    color: "#e74c3c",
                    weight: 1,
                    fillOpacity: 0,
                    dashArray: '3, 5'
                },
                interactive: false
            }).addTo(map);
        });

    // Kho lưu trữ dữ liệu đã tải để không phải tải lại
    const cache = { line: {}, poly: {} };
    const layers = { line: {}, poly: {} };

    async function toggleLayer(id, type) {
        const checkbox = document.getElementById(`${type}-${id}`);
        const statusEl = document.getElementById(`status-${id}`);

        if (checkbox.checked) {
            if (!cache[type][id]) {
                statusEl.className = 'status loading';
                statusEl.innerText = 'Đang tải...';
                try {
                    const fileName = type === 'line' ? `FULL_line_vung_${id}.json` : `FULL_polygon_vung_${id}.json`;
                    const res = await fetch(fileName);
                    cache[type][id] = await res.json();
                } catch (e) {
                    statusEl.innerText = 'Lỗi tải file';
                    checkbox.checked = false;
                    return;
                }
            }

            const style = type === 'line' 
                ? { color: "#2980b9", weight: 0.8, opacity: 0.6 }
                : { color: "#3498db", weight: 1, fillColor: "#3498db", fillOpacity: 0.4 };

            layers[type][id] = L.geoJSON(cache[type][id], {
                style: style,
                onEachFeature: function(feature, layer) {
                    // 1. Tên sông (Ưu tiên cột 'ten' hoặc 'DIADANH')
                    const name = feature.properties.ten || feature.properties.DIADANH || feature.properties.TEN_SONG || "Không tên";
                    
                    // 2. Hiển thị nhãn (Tooltip) - Chỉ hiện khi Zoom >= 13 để tránh rối
                    layer.bindTooltip(name, {
                        sticky: true,
                        className: 'river-label',
                        direction: 'top'
                    });

                    // 3. Tạo bảng thông tin chi tiết (Popup)
                    let table = '<table class="data-table">';
                    const friendlyNames = {
                        'ten': 'Tên gọi',
                        'dorong': 'Độ rộng (m)',
                        'trangthai': 'Trạng thái',
                        'shape_leng': 'Chiều dài (m)',
                        'ngaycapnha': 'Cập nhật',
                        'DIADANH': 'Địa danh',
                        'MA_SONG': 'Mã sông'
                    };

                    for (let key in feature.properties) {
                        let label = friendlyNames[key] || key;
                        let val = feature.properties[key] || '---';
                        table += `<tr><td class="label">${label}</td><td>${val}</td></tr>`;
                    }
                    table += '</table>';
                    layer.bindPopup(`<strong>THUỘC TÍNH CHI TIẾT</strong>${table}`, { maxWidth: 300 });

                    // 4. Hiệu ứng hover
                    layer.on({
                        mouseover: function() { this.setStyle({ weight: 4, color: '#f1c40f' }); },
                        mouseout: function() { 
                            const t = feature.geometry.type.includes('Polygon') ? 'poly' : 'line';
                            this.setStyle(t === 'line' ? { weight: 0.8, color: "#2980b9" } : { weight: 1, color: "#3498db" });
                        }
                    });
                }
            }).addTo(map);

            statusEl.className = 'status loaded';
            statusEl.innerText = 'Đã tải xong';
        } else {
            if (layers[type][id]) {
                map.removeLayer(layers[type][id]);
                delete layers[type][id];
            }
            if (!layers.line[id] && !layers.poly[id]) {
                statusEl.className = 'status';
                statusEl.innerText = 'Sẵn sàng';
            }
        }
    }
</script>
</body>
</html>
