<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Giám sát Hạ tầng Thủy lợi Việt Nam</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <style>
        :root { --primary-color: #007bff; --panel-bg: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; background: #eaeff2; }
        
        .header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--panel-bg); padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }
        .header h1 { margin: 0; font-size: 0.9rem; font-weight: 800; color: #1a3a5a; text-transform: uppercase; }

        /* Label Tỉnh chuyên nghiệp */
        .province-label {
            font-size: 11px; font-weight: 800; color: #2c3e50; text-transform: uppercase;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            background: transparent !important; border: none !important; box-shadow: none !important;
            pointer-events: none;
        }

        /* Label Sông tinh tế */
        .river-label {
            font-size: 9px; font-weight: 600; color: #2980b9; font-style: italic;
            text-shadow: 1px 1px 1px #fff; background: transparent !important;
            border: none !important; box-shadow: none !important; pointer-events: none;
        }

        .custom-scale-container {
            position: absolute; bottom: 25px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 2px;
            border: 1px solid #777; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold;
            display: flex; gap: 8px; align-items: center;
        }
        .scale-segment { border-bottom: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #000; height: 3px; width: 60px; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary-color); }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">ĐANG KHỞI TẠO BẢN ĐỒ THỦY LỢI...</div>
    <div class="header"><h1>Hydraulic GIS Monitoring System</h1></div>

    <div class="custom-scale-container">
        <div id="scale-text">5 km</div>
        <div class="scale-segment"></div>
        <div id="scale-ratio">1 : 0k</div>
    </div>

    <div id="map"></div>

    <script>
        // Bat che do Canvas de render muot 250k doi tuong
        const map = L.map('map', { 
            center: [16.0, 107.5], 
            zoom: 6,
            preferCanvas: true 
        });
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // Group quan ly cac lop du lieu
        const layerGroups = {
            provinces: L.layerGroup().addTo(map),
            polygons: L.layerGroup().addTo(map),
            lines: L.layerGroup(), // Chua add vao map ngay, se add khi zoom vao
            points: L.markerClusterGroup().addTo(map)
        };

        // Thanh ti le
        function updateScale() {
            const width = 60;
            const centerLatLng = map.getCenter();
            const point1 = map.latLngToLayerPoint(centerLatLng);
            const point2 = L.point(point1.x + width, point1.y);
            const latLng2 = map.layerPointToLatLng(point2);
            const dist = centerLatLng.distanceTo(latLng2);
            document.getElementById('scale-text').innerText = `${(dist/1000).toFixed(1)} km`;
            const zoom = map.getZoom();
            const ratio = Math.round(591657550 / Math.pow(2, zoom) / 1000);
            document.getElementById('scale-ratio').innerText = `1 : ${ratio}k`;
        }
        map.on('zoomend moveend', updateScale);
        updateScale();

        function getProvinceColor(name) {
            const colors = ['#fdf2f2', '#f2fdf2', '#f2f4fd', '#fdfdf2', '#f2fdfd', '#fdf2fd'];
            let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        const dataConfigs = [
            { file: 'ranh_gioi_tinh.json', type: 'province' },
            { file: 'ho_chua.json', type: 'point', color: '#007bff' },
            // Polygons (Vung song lon) - Load tat ca vi no nhe
            { file: 'song_polygon_bac.json', type: 'polygon' },
            { file: 'song_polygon_trung.json', type: 'polygon' },
            { file: 'song_polygon_nam.json', type: 'polygon' },
            // Lines (Song chi tiet) - Se duoc load dan dan
            { file: 'song_line_bac.json', type: 'line' },
            { file: 'song_line_trung.json', type: 'line' },
            { file: 'song_line_nam.json', type: 'line' }
        ];

        const provinceLabels = {};

        async function loadLayer(cfg) {
            try {
                const res = await fetch(cfg.file);
                if (!res.ok) throw new Error("File not found");
                const data = await res.json();
                
                const geojson = L.geoJSON(data, {
                    style: (f) => {
                        if (cfg.type === 'province') {
                            const name = f.properties.ten || f.properties.Ten_Tinh || "VN";
                            return { fillColor: getProvinceColor(name), weight: 0.8, opacity: 1, color: '#95a5a6', fillOpacity: 0.4 };
                        }
                        if (cfg.type === 'polygon') return { color: '#2980b9', weight: 0.5, fillColor: '#3498db', fillOpacity: 0.5 };
                        if (cfg.type === 'line') return { color: '#5dade2', weight: 0.4, opacity: 0.6 };
                        return { color: cfg.color || '#333', weight: 2 };
                    },
                    pointToLayer: (f, latlng) => {
                        return L.marker(latlng, { icon: L.divIcon({ className: '', html: `<div style="background:${cfg.color}; width:8px; height:8px; border-radius:50%; border:1px solid white;"></div>` }) });
                    },
                    onEachFeature: (f, layer) => {
                        if (cfg.type === 'province') {
                            const name = f.properties.ten || f.properties.Ten_Tinh;
                            if (name) { // Chi tao nhan neu co ten
                                const bounds = layer.getBounds();
                                const marker = L.marker(bounds.getCenter(), {
                                    icon: L.divIcon({ className: 'province-label', html: name, iconSize: [100, 20] }),
                                    interactive: false
                                });
                                provinceLabels[name] = marker;
                                marker.addTo(layerGroups.provinces);
                            }
                        }
                        if (cfg.type === 'point') layer.bindPopup(`<b>${f.properties.ten || "Công trình"}</b>`);
                        if (f.properties.ten && f.properties.ten !== "undefined") {
                            layer.bindTooltip(f.properties.ten, { sticky: true, className: 'river-label' });
                        }
                    }
                });

                if (cfg.type === 'province') geojson.addTo(layerGroups.provinces);
                else if (cfg.type === 'polygon') geojson.addTo(layerGroups.polygons);
                else if (cfg.type === 'line') geojson.addTo(layerGroups.lines);
                else if (cfg.type === 'point') geojson.addTo(layerGroups.points);

                console.log(`[OK] Loaded: ${cfg.file}`);
            } catch(e) { 
                console.warn("Chưa có dữ liệu hoặc lỗi load:", cfg.file); 
            }
        }

        // Logic kiem soat hien thi theo Zoom
        map.on('zoomend', function() {
            const zoom = map.getZoom();
            // Chi hien line khi zoom > 9 de do lag
            if (zoom >= 10) {
                if (!map.hasLayer(layerGroups.lines)) map.addLayer(layerGroups.lines);
            } else {
                if (map.hasLayer(layerGroups.lines)) map.removeLayer(layerGroups.lines);
            }
        });

        async function init() {
            // 1. Load ranh gioi tinh truoc
            await loadLayer(dataConfigs[0]);
            
            // 2. Load ho chua va Polygon song lon
            for(let i=1; i<=4; i++) {
                await loadLayer(dataConfigs[i]);
            }
            
            // Tat loader de user thay map truoc
            document.getElementById('loader').style.display = 'none';

            // 3. Load cac file Line chi tiet TUAN TU (de tranh loi WinError 10054)
            console.log("Bat dau tai du lieu chi tiet trong background...");
            for(let i=5; i<dataConfigs.length; i++) {
                await loadLayer(dataConfigs[i]);
                // Nghi 1 chut giua cac file de trinh duyet khong bi treo
                await new Promise(r => setTimeout(r, 500));
            }
            
            console.log("Da tai xong toan bo du lieu!");
            // Check zoom hien tai de quyet dinh co hien line hay khong
            if (map.getZoom() >= 10) map.addLayer(layerGroups.lines);
        }
        init();
    </script>
</body>
</html>
